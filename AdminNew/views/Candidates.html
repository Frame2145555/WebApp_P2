<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Management - MFU E-VOTING</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="/AdminNew/style/Candidates.css">

    <script>
        // ตั้งค่าสี Theme ของทีม (ตรงกับ Login page)
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'mfu-red': '#5c0f0f',   // แดง
                        'mfu-yellow': '#c9973a' // ทอง
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 font-Kanit">

    <div class="flex h-screen w-full">

        <aside class="w-64 bg-mfu-red text-white flex flex-col justify-between h-full z-20 shadow-xl">
            <div>
                <div class="p-6 text-center">
                    <h1 class="text-2xl font-black text-mfu-yellow mb-1" style="color: #c9973a;">MFU E-VOTING</h1>
                    <p class="text-xs font-Kanit opacity-80">Admin Control Panel</p>
                </div>

                <ul class="flex flex-col gap-1 px-4 text-sm font-medium">
                    <li><a href="/AdminNew/views/Term.html"
                            class="block px-4 py-3 hover:bg-red-900 rounded transition-colors">Terms</a></li>

                    <li><a href="#" onclick="goToPage('Dashboard.html')"
                            class="block px-4 py-3 hover:bg-red-900 rounded transition-colors">Dashboard</a></li>
                    <li><a href="#" onclick="goToPage('Voting.html')"
                            class="block px-4 py-3 hover:bg-red-900 rounded transition-colors">Voter Management</a></li>
                    <li><a href="#" onclick="goToPage('Candidates.html')"
                            class="block px-4 py-3 hover:bg-red-900 rounded transition-colors">Candidate Management</a>
                    </li>
                </ul>
            </div>

            <div class="p-6">
                <button id="logout-Btn" type="button"
                    onclick="window.location.href='/public/index.html'"
                    class="w-full font-bold rounded"
                    style="display:inline-flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:8px 22px; background: transparent; color: #e8b84b; border-radius:10px; font-size:0.95rem; font-weight:600; letter-spacing:0.02em; transition:all 0.3s cubic-bezier(0.4,0,0.2,1); border:1.5px solid rgba(201,151,58,0.6);"
                    onmouseover="this.style.background='rgba(201,151,58,0.12)'; this.style.borderColor='rgba(201,151,58,0.9)'; this.style.boxShadow='0 0 20px rgba(201,151,58,0.2)'"
                    onmouseout="this.style.background='transparent'; this.style.borderColor='rgba(201,151,58,0.6)'; this.style.boxShadow='none'">
                    logout
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-full overflow-hidden p-8 gap-6 bg-gray-50">

            <div>
                <h2 class="text-2xl font-bold text-gray-800">Candidate Management</h2>
                <p class="text-gray-500 text-sm mt-1">Manage candidate records and view live voting results.</p>
            </div>

            <div class="bg-white rounded-lg p-6 shadow-sm border border-gray-100">
                <h3 class="text-lg font-bold text-gray-700 mb-6">Live Results</h3>

                <div class="flex flex-col gap-5">
                </div>
            </div>

            <div class="bg-white rounded-lg p-6 shadow-sm border border-gray-100 flex-1 flex flex-col overflow-hidden">

                <div class="flex justify-between items-center mb-6">
                    <div class="relative w-64">
                        <input type="text" placeholder="Search ID or Name"
                            class="input input-bordered input-sm w-full bg-gray-50 focus:bg-white" />
                    </div>
                    <button class="btn btn-sm text-white border-none" style="background-color: #5c0f0f;" onmouseover="this.style.backgroundColor='#3d0a0a'" onmouseout="this.style.backgroundColor='#5c0f0f'"
                        onclick="add_candidate_modal.showModal()">
                        + Add Candidate
                    </button>
                </div>

                <div class="overflow-x-auto flex-1">
                    <table class="table table-sm w-full">
                        <thead class="bg-gray-50 text-gray-600">
                            <tr>
                                <th>CANDIDATE ID</th>
                                <th>Name</th>
                                <th class="text-center">Policies</th>
                                <th class="text-center">STATUS</th>
                                <th class="text-center">ACTION</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

    </div>
    <dialog id="add_candidate_modal" class="modal">
        <div class="modal-box bg-white">
            <h3 class="font-bold text-xl mb-6 border-b pb-2" style="color: #5c0f0f;">Add Candidate</h3>
            <form id="addCandidateForm">
                <div class="form-control mb-6">
                    <label class="label"><span class="label-text font-bold text-gray-600">Candidate Name
                        (Full Name)</span></label>
                    <input type="text" placeholder="Candidate full name"
                        class="input input-bordered w-full bg-gray-50 focus:bg-white" />
                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn btn-ghost text-gray-500">Cancel</button>
                    </form>
                    <button id="addCandidateBtn" type="button"
                        class="btn text-white border-none px-8" style="background-color: #5c0f0f;" onmouseover="this.style.backgroundColor='#3d0a0a'" onmouseout="this.style.backgroundColor='#5c0f0f'">Add</button>
                </div>
            </form>
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>

    <script src="/AdminNew/script/common.js"></script>
    <script src="/AdminNew/script/Candidates.js"></script>
</body>

</html>
