<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms Management - MFU E-VOTING</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'mfu-red': '#5c0f0f',
                        'mfu-yellow': '#c9973a'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-50 font-Kanit min-h-screen flex flex-col">

    <nav class="text-white p-4 shadow-md flex justify-between items-center px-6 lg:px-12" style="background-color: #5c0f0f;">
        <div class="flex items-center gap-3">
            <h1 class="text-2xl font-black text-mfu-yellow" style="color: #c9973a;">MFU E-VOTING</h1>
            <div class="hidden md:block h-6 w-px bg-white/30"></div>
            <p class="hidden md:block text-sm font-Kanit opacity-80">Admin Control Panel</p>
        </div>

        <button id="logout-Btn" type="button"
            onclick="window.location.href='/public/index.html'"
            class="font-bold rounded"
            style="display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:8px 22px; background: transparent; color: #e8b84b; border-radius:10px; font-size:0.95rem; font-weight:600; letter-spacing:0.02em; transition:all 0.3s cubic-bezier(0.4,0,0.2,1); border:1.5px solid rgba(201,151,58,0.6);"
            onmouseover="this.style.background='rgba(201,151,58,0.12)'; this.style.borderColor='rgba(201,151,58,0.9)'; this.style.boxShadow='0 0 20px rgba(201,151,58,0.2)'"
            onmouseout="this.style.background='transparent'; this.style.borderColor='rgba(201,151,58,0.6)'; this.style.boxShadow='none'">
            Logout
        </button>
    </nav>

    <main class="flex-1 w-full max-w-7xl mx-auto p-6 lg:p-8 mt-4">

        <div
            class="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h2 class="text-3xl font-bold text-gray-800">Terms Management</h2>
                <p class="text-gray-500 text-sm mt-2">เลือกรอบการเลือกตั้งเพื่อเข้าสู่ระบบจัดการและดูสถิติ</p>
            </div>
            <button class="btn bg-blue-600 hover:bg-blue-700 text-white border-none shadow-sm px-6"
                onclick="add_term_modal.showModal()">
                + Add New Term
            </button>
        </div>

        <div>
            <h3 class="text-xl font-bold text-gray-700 mb-6 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" style="width: 24px; height: 24px;" class="text-mfu-red">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
                </svg>
                Voting Rounds
            </h3>

            <div id="terms-container" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>
        </div>

    </main>

    <dialog id="add_term_modal" class="modal">
        <div class="modal-box bg-white">
            <h3 class="font-bold text-xl mb-4 text-gray-800">Add New Term</h3>

            <form id="addTermForm">
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text font-bold text-gray-600">Year / Term</span></label>
                    <input type="text" id="input-term-name" placeholder="เช่น 2/2569"
                        class="input input-bordered w-full bg-gray-50 focus:bg-white" />
                </div>

                <div class="form-control mb-6">
                    <label class="label"><span class="label-text font-bold text-gray-600">Description</span></label>
                    <textarea id="input-term-desc" class="textarea textarea-bordered h-24 bg-gray-50 focus:bg-white"
                        placeholder="รายละเอียดของวาระการเลือกตั้ง..."></textarea>
                </div>

                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn btn-ghost text-gray-500">Cancel</button>
                    </form>
                    <button type="button" id="btn-submit-term"
                        class="btn btn-primary bg-blue-600 hover:bg-blue-700 border-none text-white px-8">Add</button>
                </div>
            </form>
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>

    <script src="/AdminNew/script/common.js"></script>
    <script src="/AdminNew/script/Term.js"></script>
</body>

</html>
