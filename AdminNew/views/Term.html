<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms Management - MFU E-VOTING</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'mfu-red': '#8C1515',   
                        'mfu-yellow': '#D4AF37' 
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 font-sans overflow-hidden">

    <div class="flex h-screen w-full">

        <aside class="w-64 bg-mfu-red text-white flex flex-col justify-between h-full z-20 shadow-xl">
            <div>
                <div class="p-6 text-center mb-4">
                    <h1 class="text-2xl font-black text-mfu-yellow mb-1">MFU E-VOTING</h1>
                    <p class="text-xs font-light">Admin Control Panel</p>
                </div>

                <ul class="flex flex-col gap-1 px-4 text-sm font-medium">
                    <li><a href="#" class="block px-4 py-3 bg-red-900/60 border-l-4 border-mfu-yellow text-mfu-yellow font-bold rounded">Terms</a></li>
                    <li><a href="/AdminNew/views/Dashboard.html" class="block px-4 py-3 hover:bg-red-900 rounded transition-colors">Dashboard</a></li>
                    <li><a href="/AdminNew/views/Voting.html" class="block px-4 py-3 hover:bg-red-900 rounded transition-colors">Voter Management</a></li>
                    <li><a href="/AdminNew/views/Candidates.html" class="block px-4 py-3 hover:bg-red-900 rounded transition-colors">Candidate Management</a></li>
                </ul>
            </div>

            <div class="p-6">
                <button class="w-full text-left font-bold px-4 py-2 hover:bg-red-900 rounded transition-colors">logout</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-full overflow-hidden">

            <div class="p-8 pb-4">
                <div class="bg-white rounded-lg p-6 shadow-sm border border-gray-100 flex justify-between items-center">
                    <div>
                        <h2 class="text-2xl font-bold text-gray-800">Terms Management</h2>
                        <p class="text-gray-500 text-sm mt-1">เลือกรอบการเลือกตั้งเพื่อดูสถิติและจัดการระบบ</p>
                    </div>
                    <button class="btn btn-outline border-blue-600 text-blue-600 hover:bg-blue-600 hover:border-blue-600 hover:text-white" onclick="add_term_modal.showModal()">
                        + Add New Term
                    </button>
                </div>
            </div>

            <div class="flex-1 p-8 pt-4 overflow-y-auto">
                <h3 class="text-lg font-bold text-gray-700 mb-6">Voting Rounds</h3>

                <div id="terms-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    
                    <a href="Dashboard.html?term_id=1" class="card bg-white shadow-sm border border-gray-100 border-t-4 border-t-green-500 rounded-lg hover:shadow-lg hover:-translate-y-1 transition-all duration-200 cursor-pointer block">
                        <div class="card-body items-center text-center p-8">
                            <h2 class="card-title text-4xl font-bold text-gray-800">1 / 2569</h2>
                            <p class="text-gray-400 text-sm mt-2">คลิกเพื่อดูสถิติและจัดการ</p>
                            <div class="mt-4">
                                <span class="text-green-600 font-bold bg-green-50 px-4 py-1 rounded-full text-sm">OPEN</span>
                            </div>
                        </div>
                    </a>

                </div>
            </div>
        </main>
    
    </div> <dialog id="add_term_modal" class="modal">
        <div class="modal-box bg-white">
            <h3 class="font-bold text-xl mb-4 text-gray-800">Add New Term</h3>

            <form id="addTermForm">
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text font-bold text-gray-600">Year / Term</span></label>
                    <input type="text" id="input-term-name" placeholder="เช่น 2/2569" class="input input-bordered w-full bg-gray-50 focus:bg-white" />
                </div>

                <div class="form-control mb-6">
                    <label class="label"><span class="label-text font-bold text-gray-600">Description</span></label>
                    <textarea id="input-term-desc" class="textarea textarea-bordered h-24 bg-gray-50 focus:bg-white" placeholder="รายละเอียดของวาระการเลือกตั้ง..."></textarea>
                </div>

                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn btn-ghost text-gray-500">Cancel</button>
                    </form>
                    <button type="button" id="btn-submit-term" class="btn btn-primary bg-blue-600 hover:bg-blue-700 border-none text-white px-8">Add</button>
                </div>
            </form>
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>

    <script src="/AdminNew/script/Terms.js"></script>
</body>

</html>
