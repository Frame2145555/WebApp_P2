<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFU Election Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'mfu-red': '#5c0f0f',
                        'mfu-yellow': '#c9973a'
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="/AdminNew/style/Voting.css">
</head>

<body class="bg-gray-50">

    <div class="flex h-screen overflow-hidden">
        <aside class="sidebar w-64 text-white flex-shrink-0 flex flex-col h-full" style="background-color: #5c0f0f;">
            <div class="p-6 text-center">
                <h1 class="text-2xl font-bold mfu-gold" style="color: #c9973a;">MFU E-VOTING</h1>
                <p class="text-xs opacity-80 mt-1">Admin Control Panel</p>
            </div>
            <ul class="flex flex-col gap-1 px-4 text-sm font-medium">
                <li><a href="/AdminNew/views/Term.html"
                        class="block px-4 py-3 rounded transition-colors" onmouseover="this.style.backgroundColor='rgba(255,255,255,0.05)'" onmouseout="this.style.backgroundColor=''">Terms</a></li>

                <li><a href="#" onclick="goToPage('Dashboard.html')"
                        class="block px-4 py-3 rounded transition-colors" onmouseover="this.style.backgroundColor='rgba(255,255,255,0.05)'" onmouseout="this.style.backgroundColor=''">Dashboard</a></li>
                <li><a href="#" onclick="goToPage('Voting.html')"
                        class="block px-4 py-3 rounded transition-colors" onmouseover="this.style.backgroundColor='rgba(255,255,255,0.05)'" onmouseout="this.style.backgroundColor=''">Voter Management</a></li>
                <li><a href="#" onclick="goToPage('Candidates.html')"
                        class="block px-4 py-3 rounded transition-colors" onmouseover="this.style.backgroundColor='rgba(255,255,255,0.05)'" onmouseout="this.style.backgroundColor=''">Candidate Management</a></li>
            </ul>
            <div class="p-6 mt-auto">
                <button id="logout-Btn" type="button"
                    onclick="window.location.href='/public/index.html'"
                    class="w-full font-bold rounded"
                    style="display:inline-flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:8px 22px; background: transparent; color: #e8b84b; border-radius:10px; font-size:0.95rem; font-weight:600; letter-spacing:0.02em; transition:all 0.3s cubic-bezier(0.4,0,0.2,1); border:1.5px solid rgba(201,151,58,0.6);"
                    onmouseover="this.style.background='rgba(201,151,58,0.12)'; this.style.borderColor='rgba(201,151,58,0.9)'; this.style.boxShadow='0 0 20px rgba(201,151,58,0.2)'"
                    onmouseout="this.style.background='transparent'; this.style.borderColor='rgba(201,151,58,0.6)'; this.style.boxShadow='none'">
                    logout
                </button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-8 bg-gray-50">
            <!-- Voter Management Section -->
            <div id="section-voter" class="voter-section">
                <div class="card p-6 mb-8 border-t-4 border-blue-600">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-semibold text-gray-800">จัดการผู้มีสิทธิ์เลือกตั้ง</h2>
                        <div class="flex items-center space-x-6">
                            <div class="flex items-center space-x-4">
                                <span class="font-medium text-gray-700">แสดงเฉพาะยังไม่โหวต:</span>
                                <label class="switch flex items-center">
                                    <input type="checkbox" id="seeVotingToggle" checked>
                                    <span class="slider round"></span>
                                </label>
                            </div>
                            <button class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm hover:bg-gray-300"
                                onclick="addVoterPrompt()">เพิ่มผู้มีสิทธิ์</button>
                        </div>
                    </div>

                    <div class="overflow-hidden border rounded-lg">
                        <div class="bg-gray-50 p-4 border-b">
                            <input type="text" id="searchVoter" placeholder="ค้นหาเลขบัตรประชาชน หรือ ชื่อ..."
                                class="input-field max-w-md py-1 text-sm">
                        </div>
                        <table class="w-full text-left" id="voterTable">
                            <thead class="bg-gray-100 text-gray-600 text-sm uppercase">
                                <tr>
                                    <th class="px-6 py-3">เลขบัตรประชาชน</th>
                                    <th class="px-6 py-3">ชื่อ-นามสกุล</th>
                                    <th class="px-6 py-3 text-center">สถานะการโหวต</th>
                                    <th class="px-6 py-3 text-center">สถานะบัญชี</th>
                                    <th class="px-6 py-3 text-center">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y" id="voterTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

    </div>

    <script src="/AdminNew/script/common.js"></script>
    <script src="/AdminNew/script/Voting.js"></script>
</body>

</html>
