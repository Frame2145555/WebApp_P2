<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFU Election Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="/AdminNew/style/Voting.css">
</head>

<body class="bg-gray-50">

    <div class="flex h-screen overflow-hidden">
        <aside class="sidebar w-64 text-white flex-shrink-0 flex flex-col h-full">
            <div class="p-6 text-center">
                <h1 class="text-2xl font-bold mfu-gold">MFU E-VOTING</h1>
                <p class="text-xs opacity-80 mt-1">Admin Control Panel</p>
            </div>
            <nav class="mt-8 flex flex-col flex-1">
                <a href="/AdminNew/views/Term.html" id="menu-index" class="nav-item">Term</a>
                <a href="/AdminNew/views/Dashboard.html" id="menu-dashboards" class="nav-item">Dashboard</a>
                <a href="/AdminNew/views/Voting.html" id="menu-voters" class="nav-item active">Voter Management</a>
                <a href="/AdminNew/views/Candidates.html" id="menu-candidates" class="nav-item">Candidate Management</a>
                <button id="logout-Btn" class="nav-item mt-auto">logout</button>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-8 bg-gray-50">
            <!-- Voter Management Section -->
            <div id="section-voter" class="voter-section">
                <div class="card p-6 mb-8 border-t-4 border-blue-600">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-semibold text-gray-800">Voter Management</h2>
                        <div class="flex items-center space-x-6">
                            <div class="flex items-center space-x-4">
                                <span class="font-medium text-gray-700">See voting:</span>
                                <label class="switch flex items-center">
                                    <input type="checkbox" id="seeVotingToggle" checked>
                                    <span class="slider round"></span>
                                </label>
                            </div>
                            <button class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm hover:bg-gray-300"
                                onclick="addVoterPrompt()">Add Voter</button>
                        </div>
                    </div>

                    <div class="overflow-hidden border rounded-lg">
                        <div class="bg-gray-50 p-4 border-b">
                            <input type="text" id="searchVoter" placeholder="Search Citizen ID or Name..."
                                class="input-field max-w-md py-1 text-sm">
                        </div>
                        <table class="w-full text-left" id="voterTable">
                            <thead class="bg-gray-100 text-gray-600 text-sm uppercase">
                                <tr>
                                    <th class="px-6 py-3">Citizen ID</th>
                                    <th class="px-6 py-3">Full Name</th>
                                    <th class="px-6 py-3 text-center">Voting Status</th>
                                    <th class="px-6 py-3 text-center">Account Status</th>
                                    <th class="px-6 py-3 text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y" id="voterTableBody">
                                <tr>
                                    <td class="px-6 py-4">1-1001-XXXXX-XX-X</td>
                                    <td class="px-6 py-4">John Doe</td>
                                    <td class="px-6 py-4 text-center"><span class="px-2 py-1 bg-orange-100 text-orange-700 rounded-full text-xs font-semibold">Not Voted</span></td>
                                    <td class="px-6 py-4 text-center"><span class="px-2 py-1 bg-green-100 text-green-700 rounded-full text-xs font-semibold">Enabled</span></td>
                                    <td class="px-6 py-4 text-center">
                                        <button
                                            class="text-red-600 hover:underline text-sm font-medium">Disable</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

    </div>

    <script src="/AdminNew/script/Voting.js"></script>
</body>

</html>
