<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Information | Candidate Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../script/theme.js"></script>
    <style>
        body {
            font-family: 'Kanit', sans-serif;
        }
    </style>
</head>
<body class="bg-bgLight min-h-screen text-gray-900">
    <div class="lg:flex">
        <aside class="w-full bg-mfuRed text-white shadow-2xl lg:w-72 lg:min-h-screen">
            <div class="p-8 text-center border-b border-white/10">
                <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <img src="../image/mfu-logo.png" alt="MFU Logo" class="w-12">
                </div>
                <h2 class="font-black text-2xl">MFU</h2>
                <p class="text-sm text-white/70 mt-2">Candidate workspace</p>
            </div>
            <nav class="flex-grow">
                <a href="./candidate_dashboard.html" class="flex items-center px-8 py-4 text-white/80 hover:bg-white/10 font-semibold transition">Dashboard</a>
                <a href="./personal_info.html" class="flex items-center px-8 py-4 bg-white/10 border-r-4 border-mfuGold font-bold">Personal Info</a>
            </nav>
            <div class="p-8">
                <button id="logoutButton" class="w-full py-3 bg-mfuGold text-white rounded-xl font-bold shadow-lg">Logout</button>
            </div>
        </aside>

        <main class="flex-grow p-6 md:p-10">
            <header class="mb-8">
                <p class="text-sm font-semibold uppercase tracking-[0.3em] text-mfuRed/70">Candidate Profile</p>
                <h1 class="text-3xl md:text-4xl font-black mt-2">Personal Information</h1>
                <p class="text-gray-600 mt-2">Fill in your personal details for election profile records.</p>
            </header>

            <section class="bg-white p-8 md:p-10 rounded-[2rem] shadow-sm border border-gray-100 max-w-4xl">
                <form id="personalInfoForm" class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="md:col-span-2">
                        <label class="text-sm font-semibold text-gray-600">Full Name</label>
                        <input id="full_name" type="text" class="mt-2 w-full rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 outline-none focus:ring-2 focus:ring-mfuGold" placeholder="Enter your full name">
                    </div>

                    <div>
                        <label class="text-sm font-semibold text-gray-600">Student ID</label>
                        <input id="student_id" type="text" class="mt-2 w-full rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 outline-none focus:ring-2 focus:ring-mfuGold" placeholder="e.g. 6531501001">
                    </div>

                    <div>
                        <label class="text-sm font-semibold text-gray-600">Phone</label>
                        <input id="phone" type="text" class="mt-2 w-full rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 outline-none focus:ring-2 focus:ring-mfuGold" placeholder="e.g. 08x-xxx-xxxx">
                    </div>

                    <div>
                        <label class="text-sm font-semibold text-gray-600">Faculty</label>
                        <input id="faculty" type="text" class="mt-2 w-full rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 outline-none focus:ring-2 focus:ring-mfuGold" placeholder="Faculty name">
                    </div>

                    <div>
                        <label class="text-sm font-semibold text-gray-600">Major</label>
                        <input id="major" type="text" class="mt-2 w-full rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 outline-none focus:ring-2 focus:ring-mfuGold" placeholder="Major / Program">
                    </div>

                    <div class="md:col-span-2">
                        <label class="text-sm font-semibold text-gray-600">Email</label>
                        <input id="email" type="email" class="mt-2 w-full rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 outline-none focus:ring-2 focus:ring-mfuGold" placeholder="example@mfu.ac.th">
                    </div>

                    <div class="md:col-span-2">
                        <label class="text-sm font-semibold text-gray-600">About You</label>
                        <textarea id="about" rows="5" class="mt-2 w-full rounded-2xl border border-gray-200 bg-gray-50 px-4 py-3 outline-none focus:ring-2 focus:ring-mfuGold" placeholder="Tell voters about your background..."></textarea>
                    </div>

                    <div class="md:col-span-2 flex flex-wrap gap-3 items-center">
                        <button id="saveButton" type="submit" class="px-7 py-3 rounded-2xl bg-mfuRed text-white font-bold shadow-lg">Save Personal Info</button>
                        <a href="./candidate_dashboard.html" class="px-7 py-3 rounded-2xl bg-gray-100 text-gray-700 font-bold">Back to Dashboard</a>
                        <span id="formStatus" class="text-sm font-semibold text-gray-500">Loading profile data...</span>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <script src="/public/js/voting-app.js"></script>
    <script src="../script/personal-info.js"></script>
</body>
</html>
