<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Dashboard | MFU Voting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/theme.js"></script>
</head>
<body class="bg-bgGrey min-h-screen flex flex-col">

    <header class="bg-mfuRed px-6 h-16 flex items-center justify-between shadow-md">
        <div class="flex items-center gap-3">
            <img src="assets/images/mfu-logo.png" alt="MFU Logo" class="h-10 w-auto brightness-0 invert">
            <span class="font-bold text-white text-lg uppercase">MFU Voting - Voter Dashboard</span>
        </div>
        <button id="logoutButton" class="bg-white text-mfuRed px-6 py-2 rounded-lg font-bold hover:bg-gray-100">Logout</button>
    </header>

    <main class="flex-grow flex flex-col items-center pt-12 px-6">
        <div class="w-full max-w-5xl space-y-8">
            <section class="bg-white p-12 rounded-3xl shadow-lg">
                <h2 class="text-3xl font-bold text-mfuRed mb-8">Welcome, <span id="username">Voter</span>!</h2>
            
                <div class="space-y-4 mb-8 p-6 bg-blue-50 rounded-2xl border border-blue-200">
                    <p class="text-lg font-semibold text-gray-800">Your Information:</p>
                    <p class="text-gray-700"><strong>User ID:</strong> <span id="userId">--</span></p>
                    <p class="text-gray-700"><strong>Username:</strong> <span id="userUsername">--</span></p>
                    <p class="text-gray-700"><strong>Role:</strong> <span id="userRole" class="text-blue-600 font-bold">VOTER</span></p>
                </div>

                <div class="bg-green-50 border border-green-300 rounded-2xl p-6">
                    <h3 class="text-xl font-bold text-green-700 mb-4">Ballot Status</h3>
                    <p id="votingStatusMessage" class="text-sm font-semibold text-gray-700">Loading ballot status...</p>
                    <p class="mt-4 text-gray-700"><strong>Selected Candidate:</strong> <span id="selectedCandidateValue">--</span></p>
                </div>
            </section>

            <section class="space-y-6">
                <div>
                    <p class="text-xs uppercase tracking-[0.3em] text-gray-400">Candidates</p>
                    <h3 class="mt-2 text-2xl font-bold text-mfuRed">Choose One Candidate</h3>
                </div>
                <div id="candidateList" class="grid grid-cols-1 gap-6"></div>
            </section>
        </div>
    </main>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/voter-dashboard.js"></script>
</body>
</html>
