<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Login (For Testing)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box h2 {
            color: #8C1515; /* สีแดง มฟล */
            margin-bottom: 5px;
        }
        .login-box p {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #8C1515;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #6b0f0f;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>🛠️ Test Login</h2>
        <p>Mock login page for testing the Voter Dashboard</p>

        <input type="text" id="mockId" placeholder="Student ID (e.g., 6431201011)" value="6431201011">
        <input type="text" id="mockName" placeholder="Full name (e.g., John Doe)" value="John Doe">
        
        <button onclick="doMockLogin()">Sign in (mock)</button>
    </div>

    <script>
        function doMockLogin() {
            const voterId = document.getElementById('mockId').value || '6431201011';
            const voterName = document.getElementById('mockName').value || 'Test Student';

            // 1. ปั้นก้อนข้อมูล User แบบเดียวกับที่ Backend ของเพื่อนจะส่งมาให้
            const mockUser = {
                user_id: Math.floor(Math.random() * 1000) + 1, // สุ่ม ID จำลอง
                username: voterId,
                display_name: voterName,
                role: 'voter'
            };

            // 2. ยัดใส่ sessionStorage เพื่อให้หน้า Dashboard มองเห็นบัตรผ่าน
            sessionStorage.setItem('user', JSON.stringify(mockUser));

            // 3. วาร์ปไปหน้า Dashboard (อย่าลืมแก้ URL ตรงนี้ให้ตรงกับชื่อไฟล์ Dashboard ของคุณนะครับ)
            window.location.replace('/Voter-Dashboard');
        }
    </script>

</body>
</html>
