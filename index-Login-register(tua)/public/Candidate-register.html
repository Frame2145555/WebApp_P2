<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Register — MFU Voting</title>
    <link rel="stylesheet" href="/css/Candidate-register.css">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- Success Popup Modal -->
        <div id="successModal" class="modal-overlay">
            <div class="modal-content success-modal">
                <button type="button" class="modal-close" onclick="closeSuccessModal()">
                    <i class="bx bx-x"></i>
                </button>
                <div class="modal-icon success-icon">
                    <i class="bx bx-check-circle"></i>
                </div>
                <h2 class="modal-title">ลงทะเบียนสำเร็จ</h2>
                <p class="modal-message">บัญชีของคุณสร้างเสร็จแล้ว<br>กำลังนำคุณไปยังหน้า Login...</p>
                <div class="modal-loader">
                    <div class="loader-dot"></div>
                    <div class="loader-dot"></div>
                    <div class="loader-dot"></div>
                </div>
            </div>
        </div>

        <!-- Error Popup Modal -->
        <div id="errorModal" class="modal-overlay">
            <div class="modal-content error-modal">
                <button type="button" class="modal-close" onclick="closeErrorModal()">
                    <i class="bx bx-x"></i>
                </button>
                <div class="modal-icon error-icon">
                    <i class="bx bx-error-circle"></i>
                </div>
                <h2 class="modal-title">เกิดข้อผิดพลาด</h2>
                <p class="modal-message" id="errorMessage"></p>
                <button type="button" class="modal-btn" onclick="closeErrorModal()">ลองใหม่อีกครั้ง</button>
            </div>
        </div>

        <nav class="navbar">
            <div class="nav-brand">
                <a class="nav-logo-icon" href="/public/index.html">
                    <img src="/img/csm_logo_mfu_3d_colour_630b77d675.png" alt="MFU Logo">
                </a>
                <a class="nav-logo-text" href="/public/index.html">MFU-Voting</a>
            </div>
            <div class="nav-actions">
                <a class="nav-link" href="/public/index.html">
                    <i class="bx bx-home"></i>
                    <span>Home</span>
                </a>
            </div>
        </nav>

        <main class="main-register">
            <div class="register-card">

                <div class="card-header">
                    <h1>Candidate Register</h1>
                    <p class="subtitle">Create your candidate account</p>
                </div>

                <div class="divider"></div>

                <form class="card-body" id="formRegister">

                    <div class="input-group">
                        <label for="candidateID">Candidate ID</label>
                        <div class="input-wrapper">
                            <i class="bx bx-id-card input-icon"></i>
                            <input type="text" id="candidateID" name="username" placeholder="เช่น CAND-001" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="bx bx-lock-alt input-icon"></i>
                            <input type="password" id="password" name="password" placeholder="Create a password (ขั้นต่ำ 8 ตัวอักษร)" required>
                            <button class="toggle-pw" type="button" tabindex="-1" onclick="togglePasswordField('password')">
                                <svg class="eye-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path class="eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle class="eye-open" cx="12" cy="12" r="3"></circle>
                                    <path class="eye-closed" style="display:none;" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                    <line class="eye-closed" style="display:none;" x1="1" y1="1" x2="23" y2="23"></line>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="confirm_password">Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="bx bx-lock-alt input-icon"></i>
                            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
                            <button class="toggle-pw" type="button" tabindex="-1" onclick="togglePasswordField('confirm_password')">
                                <svg class="eye-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path class="eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle class="eye-open" cx="12" cy="12" r="3"></circle>
                                    <path class="eye-closed" style="display:none;" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                    <line class="eye-closed" style="display:none;" x1="1" y1="1" x2="23" y2="23"></line>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="button-register-con">
                        <button type="submit" class="btn-register" style="border: none; cursor: pointer; width: 100%;">
                            <span>Register</span>
                            <i class="bx bx-right-arrow-alt"></i>
                        </button>
                    </div>
                </form>

                <div class="card-footer">
                    <p>Already have an account? <a href="/public/Login.html">Sign In</a></p>
                </div>
            </div>
        </main>

        <footer>
            <span>&copy; 2567 Mae Fah Luang University. All rights reserved.</span>
        </footer>
    </div>

    <script>
        const successModal = document.getElementById('successModal');
        const errorModal = document.getElementById('errorModal');

        // Toggle password visibility with SVG
        function togglePasswordField(inputId) {
            const input = document.getElementById(inputId);
            const button = event.target.closest('.toggle-pw');
            const eyeOpenPaths = button.querySelectorAll('.eye-open');
            const eyeClosedPaths = button.querySelectorAll('.eye-closed');
            
            if (input.type === 'password') {
                input.type = 'text';
                eyeOpenPaths.forEach(el => el.style.display = 'none');
                eyeClosedPaths.forEach(el => el.style.display = 'inherit');
            } else {
                input.type = 'password';
                eyeOpenPaths.forEach(el => el.style.display = 'inherit');
                eyeClosedPaths.forEach(el => el.style.display = 'none');
            }
        }

        function showSuccessModal(redirectUrl) {
            successModal.classList.add('show');
            setTimeout(() => {
                location.replace(redirectUrl);
            }, 2500);
        }

        function closeSuccessModal() {
            successModal.classList.remove('show');
        }

        function showErrorModal(message) {
            document.getElementById('errorMessage').textContent = message;
            errorModal.classList.add('show');
        }

        function closeErrorModal() {
            errorModal.classList.remove('show');
        }

        // Close modal when clicking outside
        successModal.addEventListener('click', (e) => {
            if (e.target === successModal) closeSuccessModal();
        });

        errorModal.addEventListener('click', (e) => {
            if (e.target === errorModal) closeErrorModal();
        });

        // ── Submit form ──
        const formRegister = document.getElementById('formRegister');

        formRegister.onsubmit = async function (e) {
            e.preventDefault();

            const candidate_id = document.getElementById('candidateID').value.trim();
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;

            if (!candidate_id) {
                showErrorModal('กรุณากรอก Candidate ID');
                return;
            }
            if (password.length < 8) {
                showErrorModal('Password must be at least 8 characters');
                return;
            }
            if (password !== confirm_password) {
                showErrorModal('รหัสผ่านและการยืนยันรหัสผ่านไม่ตรงกัน!');
                return;
            }

            try {
                const verifyRes = await fetch(`/api/register/verify/${encodeURIComponent(candidate_id)}`);
                const verifyData = await verifyRes.json();

                if (!verifyRes.ok) {
                    showErrorModal(verifyData.error || 'Invalid Candidate ID');
                    return;
                }

                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        candidate_id,
                        password,
                        confirm_password
                    }),
                });
                const data = await res.json();

                if (!res.ok) {
                    showErrorModal(data.error || 'Registration failed');
                    return;
                }

                showSuccessModal('/public/Login.html');

            } catch (err) {
                showErrorModal('Cannot connect to server');
                console.error(err);
            }
        }
    </script>
</body>

</html>
