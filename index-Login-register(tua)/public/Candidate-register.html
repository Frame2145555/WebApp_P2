<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Register — MFU Voting</title>
    <link rel="stylesheet" href="/css/Candidate-register.css">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <nav class="navbar">
            <div class="nav-brand">
                <a class="nav-logo-icon" href="/public/index.html">
                    <img src="/img/csm_logo_mfu_3d_colour_630b77d675.png" alt="MFU Logo">
                </a>
                <a class="nav-logo-text" href="/public/index.html">MFU-Voting</a>
            </div>
            <div class="nav-actions">
                <a class="nav-link" href="/public/index.html">
                    <i class="bx bx-home"></i>
                    <span>Home</span>
                </a>
            </div>
        </nav>

        <main class="main-register">
            <div class="register-card">

                <div class="card-header">
                    <h1>Candidate Register</h1>
                    <p class="subtitle">Create your candidate account</p>
                </div>

                <div class="divider"></div>

                <form class="card-body" id="formRegister">

                    <div class="input-group">
                        <label for="candidateID">Candidate ID</label>
                        <div class="input-wrapper">
                            <i class="bx bx-id-card input-icon"></i>
                            <input type="text" id="candidateID" name="username" placeholder="เช่น CAND-001" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="bx bx-lock-alt input-icon"></i>
                            <input type="password" id="password" name="password" placeholder="Create a password (ขั้นต่ำ 8 ตัวอักษร)" required>
                            <button class="toggle-pw" type="button" tabindex="-1" onclick="togglePassword('password','eyeIcon1')">
                                <i class="bx bx-hide" id="eyeIcon1"></i>
                            </button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="confirm_password">Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="bx bx-lock-alt input-icon"></i>
                            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
                            <button class="toggle-pw" type="button" tabindex="-1" onclick="togglePassword('confirm_password','eyeIcon2')">
                                <i class="bx bx-hide" id="eyeIcon2"></i>
                            </button>
                        </div>
                    </div>

                    <div class="button-register-con">
                        <button type="submit" class="btn-register" style="border: none; cursor: pointer; width: 100%;">
                            <span>Register</span>
                            <i class="bx bx-right-arrow-alt"></i>
                        </button>
                    </div>
                </form>

                <div class="card-footer">
                    <p>Already have an account? <a href="/public/Login.html">Sign In</a></p>
                </div>
            </div>
        </main>

        <footer>
            <span>&copy; 2567 Mae Fah Luang University. All rights reserved.</span>
        </footer>
    </div>

    <script>
        // ── Toggle show / hide password ──
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            const isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            icon.className = isHidden ? 'bx bx-show' : 'bx bx-hide';
        }

        // ── Submit form ──
        const formRegister = document.getElementById('formRegister');

        formRegister.onsubmit = async function (e) {
            e.preventDefault();

            // 🚨 รับค่าจากฟิลด์ใหม่ที่เราเพิ่งแก้ไป
            const candidate_id = document.getElementById('candidateID').value.trim();
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;

            if (!candidate_id) {
                alert('กรุณากรอก Candidate ID');
                return;
            }
            if (password.length < 8) {
                alert('Password must be at least 8 characters');
                return;
            }
            // 🚨 เช็คว่ารหัสผ่าน 2 ช่องตรงกันไหม
            if (password !== confirm_password) {
                alert('รหัสผ่านและการยืนยันรหัสผ่านไม่ตรงกัน!');
                return;
            }

            try {
                // Step 1: verify ก่อนว่า ID ถูกและยังไม่ register
                const verifyRes = await fetch(`/api/register/verify/${encodeURIComponent(candidate_id)}`);
                const verifyData = await verifyRes.json();

                if (!verifyRes.ok) {
                    alert(verifyData.error || 'Invalid Candidate ID');
                    return;
                }

                // Step 2: register
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        candidate_id,
                        password,
                        confirm_password // 🚨 ส่งตัว confirm จริงๆ ไปให้ Backend ตรวจสอบ
                    }),
                });
                const data = await res.json();

                if (!res.ok) {
                    alert(data.error || 'Registration failed');
                    return;
                }

                alert('ลงทะเบียนสำเร็จ! กรุณาเข้าสู่ระบบด้วยรหัสผ่านใหม่ของคุณ');
                location.replace('/Login');

            } catch (err) {
                alert('Cannot connect to server');
                console.error(err);
            }
        }
    </script>
</body>

</html>
