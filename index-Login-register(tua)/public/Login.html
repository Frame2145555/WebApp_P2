<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter Login | MFU-Voting</title>
    <link rel="stylesheet" href="/css/Login.css">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&family=Cinzel:wght@700;900&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">
        <nav class="navbar">
            <div class="nav-brand">
                <a class="nav-Logo-icon" href="/public/index.html">
                    <img src="/img/csm_logo_mfu_3d_colour_630b77d675.png" alt="MFU Logo">
                </a>
                <a class="nav-Logo-text" href="/public/index.html">MFU<span>Voting</span></a>
            </div>
            <div class="nav-actions">
                <a class="nav-link" href="/public/index.html">
                    <i class="bx bx-home"></i>
                    <span>Home</span>
                </a>
            </div>
        </nav>

        <main class="main-login">
            <div class="login-card">

                <!-- Card left panel -->
                <div class="card-left">
                    <div class="card-left-logo">
                        <img src="/img/csm_logo_mfu_3d_colour_630b77d675.png" alt="MFU Logo">
                    </div>
                    <h2>MFU<span>Voting</span></h2>
                    <p>Secure, transparent and accessible election platform for Mae Fah Luang University.</p>
                </div>

                <!-- Card right panel — form -->
                <div class="card-right">
                    <div class="form-header">
                        <h1>Login</h1>
                    </div>

                    <form id="formLogin" class="login-form">
                        <div class="input-group">
                            <label for="citizenID">Citizen ID</label>
                            <div class="input-wrap">
                                <i class="bx bx-id-card input-icon"></i>
                                <input type="text" id="citizenID" name="username"
                                    placeholder="Enter your 13-digit citizen ID" maxlength="13" required>
                            </div>
                        </div>

                        <div class="input-group">
                            <label for="password">Laser ID</label>
                            <div class="input-wrap">
                                <i class="bx bx-lock-alt input-icon"></i>
                                <input type="password" id="password" name="password" placeholder="Enter your laser code"
                                    required>
                                <button type="button" class="toggle-pw" tabindex="-1" aria-label="Toggle password">
                                    <i class="bx bx-show"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn-signin">
                            <i class="bx bx-log-in-circle"></i>
                            Sign In
                        </button>
                    </form>

                    <div class="divider"><span>or</span></div>

                    <div class="go-candidate-login">
                        <i class="bx bx-user-voice"></i>
                        Are you a candidate?
                        <a href="/public/Candidate-register.html">Candidate register</a>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <div class="footer-inner">
                <p>&copy; 2567 Mae Fah Luang University. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <script>
        const formLogin = document.querySelector('#formLogin');

        formLogin.onsubmit = async function (e) {
            e.preventDefault();

            try {
                const username = formLogin['username'].value.trim();
                const password = formLogin['password'].value.trim();

                const options = {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username,
                        password
                    })
                };

                const response = await fetch('/api/login', options);
                if (response.ok) {
                    const data = await response.json(); // รับ JSON

                    // 🚨 ลบโค้ดเดิมที่เพื่อนปั้นก้อนข้อมูลเองทิ้งไปเลย
                    // แล้วเอา data.user ที่ส่งมาจาก Backend (ซึ่งมีข้อมูลครบทุกอย่าง) ยัดลงกระเป๋าตรงๆ!
                    if (data.user) {
                        localStorage.setItem('user', JSON.stringify(data.user));
                    } else {
                        // (ใส่เผื่อไว้กรณีฉุกเฉิน)
                        const sessionUser = { user_id: data.user_id, role: data.role, username };
                        localStorage.setItem('user', JSON.stringify(sessionUser));
                    }

                    location.replace(data.redirect);    // ดึง redirect จาก JSON
                } else {
                    const message = await response.text();
                    throw new Error(message);
                }

            } catch (error) {
                alert("แจ้งเตือน: " + error.message);
                console.error("เกิดข้อผิดพลาด:", error);
            }
        }
    </script>
</body>

</html>
