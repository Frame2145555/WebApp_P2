<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - E-Voting</title>
    <link rel="stylesheet" href="/VoterDashboard/public/css/history.css">
</head>

<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo-section">
                <div class="logo-circle">MFU</div>
                <div class="logo-text"><span class="main">E-VOTING</span><span class="sub">Dashboard</span></div>
            </div>
            <div class="menu-section">
                <div class="menu-title">MAIN MENU</div>
                <a href="/VoterDashboard/views/profile.html" class="menu-item"><span class="menu-icon">👤</span>
                    <span>Profile</span></a>
                <a href="/VoterDashboard/views/dashboard.html" class="menu-item"><span class="menu-icon">📊</span>
                    <span>Dashboard</span></a>
                <a href="/VoterDashboard/views/policies.html" class="menu-item"><span class="menu-icon">👥</span>
                    <span>Policies</span></a>
                <a href="/VoterDashboard/views/vote.html" class="menu-item"><span class="menu-icon">🗳️</span> <span>Vote</span></a>
                <a href="/VoterDashboard/views/history.html" class="menu-item active"><span class="menu-icon">📜</span>
                    <span>History</span></a>
            </div>
            <div class="menu-section">
                <div class="menu-title">RESULTS</div>
                <a href="/VoterDashboard/views/search.html" class="menu-item"><span class="menu-icon">🔍</span> <span>Search
                        Results</span></a>
            </div>
            <button class="logout-btn">Log Out</button>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <div class="page-header">
                    <h1 class="page-title">Voting History</h1>
                    <span class="page-subtitle">Your activity log</span>
                </div>
                <div class="status-indicator"><span class="status-dot"></span> <span>Live Data</span></div>
            </div>
            <div class="content">
                <div id="historyContainer">
                    <div class="history-table">
                        <div class="table-header">
                            <div>Candidate</div>
                            <div>Action</div>
                            <div>Timestamp</div>
                        </div>
                        <!-- History data will be loaded here -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/VoterDashboard/public/js/voting-app.js"></script>
    <script src="/VoterDashboard/public/js/history.js"></script>
</body>

</html>
