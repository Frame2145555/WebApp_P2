<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote - E-Voting</title>
    <link rel="stylesheet" href="/VoterDashboard/public/css/vote.css">
</head>

<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo-section">
                <div class="logo-circle">MFU</div>
                <div class="logo-text"><span class="main">E-VOTING</span><span class="sub">Dashboard</span></div>
            </div>
            <div class="menu-section">
                <div class="menu-title">MAIN MENU</div>
                <a href="/VoterDashboard/views/profile.html" class="menu-item"><span class="menu-icon">👤</span>
                    <span>Profile</span></a>
                <a href="/VoterDashboard/views/dashboard.html" class="menu-item"><span class="menu-icon">📊</span>
                    <span>Dashboard</span></a>
                <a href="/VoterDashboard/views/policies.html" class="menu-item"><span class="menu-icon">👥</span>
                    <span>Policies</span></a>
                <a href="/VoterDashboard/views/vote.html" class="menu-item active"><span class="menu-icon">🗳️</span>
                    <span>Vote</span></a>
                <a href="/VoterDashboard/views/history.html" class="menu-item"><span class="menu-icon">📜</span>
                    <span>History</span></a>
            </div>
            <div class="menu-section">
                <div class="menu-title">RESULTS</div>
                <a href="/VoterDashboard/views/search.html" class="menu-item"><span class="menu-icon">🔍</span> <span>Search
                        Results</span></a>
            </div>
            <button class="logout-btn">Log Out</button>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <div class="page-header">
                    <h1 class="page-title">Cast Your Vote</h1>
                    <span class="page-subtitle">Select your preferred candidate</span>
                </div>
                <div class="status-indicator"><span class="status-dot"></span> <span>Live Data</span></div>
            </div>
            <div class="content">
                <div class="candidates-grid">
                    <div class="candidate-card">
                        <div class="candidate-avatar">1</div>
                        <h3 class="candidate-name">Candidate Name 1</h3>
                        <p class="candidate-party">Party A</p>
                        <button class="vote-btn">Vote Now</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/VoterDashboard/public/js/vote.js"></script>
</body>

</html>
