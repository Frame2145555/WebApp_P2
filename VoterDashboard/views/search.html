<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - E-Voting</title>
    <link rel="stylesheet" href="/public/css/search.css">
</head>

<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo-section">
                <div class="logo-circle">MFU</div>
                <div class="logo-text"><span class="main">E-VOTING</span><span class="sub">Dashboard</span></div>
            </div>
            <div class="menu-section">
                <div class="menu-title">MAIN MENU</div>
                <a href="/views/profile.html" class="menu-item"><span class="menu-icon">👤</span>
                    <span>Profile</span></a>
                <a href="/views/dashboard.html" class="menu-item"><span class="menu-icon">📊</span>
                    <span>Dashboard</span></a>
                <a href="/views/policies.html" class="menu-item"><span class="menu-icon">👥</span>
                    <span>Policies</span></a>
                <a href="/views/vote.html" class="menu-item"><span class="menu-icon">🗳️</span> <span>Vote</span></a>
                <a href="/views/history.html" class="menu-item"><span class="menu-icon">📜</span>
                    <span>History</span></a>
            </div>
            <div class="menu-section">
                <div class="menu-title">RESULTS</div>
                <a href="/views/search.html" class="menu-item active"><span class="menu-icon">🔍</span> <span>Search
                        Results</span></a>
            </div>
            <button class="logout-btn">Log Out</button>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <div class="page-header">
                    <h1 class="page-title">Search Results</h1>
                    <span class="page-subtitle">Real-time election tracking</span>
                </div>
                <div class="status-indicator"><span class="status-dot"></span> <span>Live Data</span></div>
            </div>
            <div class="content">
                <div class="search-input-group">
                    <input type="text" placeholder="Search candidate name or party...">
                    <button class="search-btn">Search</button>
                </div>
                <div class="search-results">
                    <div class="search-result-item">
                        <div>
                            <strong style="font-size: 18px; color: var(--crimson-dark);">Candidate Name 1</strong>
                            <span style="color:var(--text-muted); display:block; margin-top: 5px;">Party A</span>
                        </div>
                        <div class="result-score">500 Votes</div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="/public/js/search.js"></script>
</body>

</html>
