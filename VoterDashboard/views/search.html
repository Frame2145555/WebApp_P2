<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - E-Voting</title>
    <link rel="stylesheet" href="/VoterDashboard/public/css/search.css">
</head>

<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo-section">
                <div class="logo-circle">MFU</div>
                <div class="logo-text"><span class="main">E-VOTING</span><span class="sub">Dashboard</span></div>
            </div>
            <div class="menu-section">
                <div class="menu-title">MAIN MENU</div>
                <a href="/VoterDashboard/views/profile.html" class="menu-item"><span class="menu-icon">👤</span>
                    <span>Profile</span></a>
                <a href="/VoterDashboard/views/dashboard.html" class="menu-item"><span class="menu-icon">📊</span>
                    <span>Dashboard</span></a>
                <a href="/VoterDashboard/views/policies.html" class="menu-item"><span class="menu-icon">👥</span>
                    <span>Policies</span></a>
                <a href="/VoterDashboard/views/vote.html" class="menu-item"><span class="menu-icon">🗳️</span> <span>Vote</span></a>
                <a href="/VoterDashboard/views/history.html" class="menu-item"><span class="menu-icon">📜</span>
                    <span>History</span></a>
            </div>
            <div class="menu-section">
                <div class="menu-title">RESULTS</div>
                <a href="/VoterDashboard/views/search.html" class="menu-item active"><span class="menu-icon">🔍</span> <span>Search
                        Results</span></a>
            </div>
            <button class="logout-btn">Log Out</button>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <div class="page-header">
                    <h1 class="page-title">Search Results</h1>
                    <span class="page-subtitle">Real-time election tracking</span>
                </div>
                <div class="status-indicator"><span class="status-dot"></span> <span>Live Data</span></div>
            </div>
            <div class="content">
                <div class="search-input-group">
                    <input type="text" id="searchInput" placeholder="Search candidate name or party...">
                    <button class="search-btn" onclick="performSearch()">Search</button>
                </div>
                <div id="searchResultsContainer" class="search-results">
                    <!-- Search results will be loaded here -->
                </div>
            </div>
        </main>
    </div>
    <script src="/VoterDashboard/public/js/voting-app.js"></script>
    <script src="/VoterDashboard/public/js/search.js"></script>
</body>

</html>
