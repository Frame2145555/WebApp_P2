<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Policies - E-Voting</title>
    <link rel="stylesheet" href="/VoterDashboard/public/css/policies.css">
</head>

<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo-section">
                <div class="logo-circle">MFU</div>
                <div class="logo-text"><span class="main">E-VOTING</span><span class="sub">Dashboard</span></div>
            </div>
            <div class="menu-section">
                <div class="menu-title">MAIN MENU</div>
                <a href="/VoterDashboard/views/profile.html" class="menu-item"><span class="menu-icon">👤</span>
                    <span>Profile</span></a>
                <a href="/VoterDashboard/views/dashboard.html" class="menu-item"><span class="menu-icon">📊</span>
                    <span>Dashboard</span></a>
                <a href="/VoterDashboard/views/policies.html" class="menu-item active"><span class="menu-icon">👥</span>
                    <span>Policies</span></a>
                <a href="/VoterDashboard/views/vote.html" class="menu-item"><span class="menu-icon">🗳️</span> <span>Vote</span></a>
                <a href="/VoterDashboard/views/history.html" class="menu-item"><span class="menu-icon">📜</span>
                    <span>History</span></a>
            </div>
            <div class="menu-section">
                <div class="menu-title">RESULTS</div>
                <a href="/VoterDashboard/views/search.html" class="menu-item"><span class="menu-icon">🔍</span> <span>Search
                        Results</span></a>
            </div>
            <button class="logout-btn">Log Out</button>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <div class="page-header">
                    <h1 class="page-title">Candidate Policies</h1>
                    <span class="page-subtitle">Learn about each candidate</span>
                </div>
                <div class="status-indicator"><span class="status-dot"></span> <span>Live Data</span></div>
            </div>
            <div class="content">
                <div id="candidatesGridPolicies" class="candidates-grid">
                    <!-- Candidates will be loaded here -->
                </div>
            </div>
        </main>
    </div>
    <div class="modal" id="policyModal">
        <div class="modal-content">
            <h3 id="policyTitle">Policy Title</h3>
            <div class="policy-content">
                <p id="policyContent">Policy content will appear here...</p>
            </div>
            <div class="modal-actions">
                <button class="btn-primary" onclick="document.getElementById('policyModal').classList.remove('active')">Close</button>
            </div>
        </div>
    </div>
    <script src="/VoterDashboard/public/js/voting-app.js"></script>
    <script src="/VoterDashboard/public/js/policies.js"></script>
</body>

</html>
