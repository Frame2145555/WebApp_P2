<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MFU Voting | Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/theme.js"></script>
</head>
<body class="bg-bgGrey min-h-screen flex flex-col">
  <header class="bg-mfuRed px-6 h-16 flex items-center shadow-md">
    <img src="assets/images/mfu-logo.png" alt="MFU Logo" class="h-10 brightness-0 invert">
    <span class="ml-3 font-bold text-white uppercase tracking-tight">MFU Voting System</span>
  </header>

  <main class="flex-grow flex items-center justify-center px-4">
    <div class="w-full max-w-sm rounded-[2.5rem] border border-gray-100 bg-white p-10 shadow-2xl">
      <div class="mb-8 text-center">
        <img src="assets/images/mfu-logo.png" alt="MFU Logo" class="mx-auto mb-4 w-16">
        <h1 class="text-3xl font-extrabold text-gray-900">MFU Voting System</h1>
      </div>

      <form id="loginForm" class="space-y-6 text-left">
        <input
          type="text"
          name="username"
          required
          class="w-full rounded-2xl bg-gray-50 px-5 py-4 outline-none focus:ring-2 focus:ring-mfuRed/20"
          placeholder="Username"
        >
        <input
          type="password"
          name="password"
          required
          class="w-full rounded-2xl bg-gray-50 px-5 py-4 outline-none focus:ring-2 focus:ring-mfuRed/20"
          placeholder="Password"
        >
        <button type="submit" class="w-full rounded-2xl bg-mfuRed py-4 font-bold text-white shadow-lg transition hover:bg-red-800">
          Sign In
        </button>
      </form>

      <p id="message" class="mt-6 text-xs font-bold uppercase text-red-600"></p>
    </div>
  </main>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
