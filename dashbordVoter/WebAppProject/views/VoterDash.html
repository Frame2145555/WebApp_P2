<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/dashbordVoter/WebAppProject/public/css/daisyui@5.css">
    <script src="/dashbordVoter/WebAppProject/public/js/tailwind.js"></script>
    <title>Voter Dashboard</title>
    <style>
        .main-bg {
            background-color: whitesmoke;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: white;
            margin-bottom: 2rem;
        }

        table,
        th,
        td {
            border: 1px solid #333;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }

        .candidate-card {
            background-color: #D9B521;
            border: 1px solid #9A6B00;
            width: 175px;
            height: 250px;
            transition: transform 0.2s;
        }

        .candidate-card:hover {
            transform: scale(1.05);
        }

        .sm-btn {
            background-color: #9A6B00;
            color: white;
            border: none;
        }

        .sm-btn:hover {
            background-color: #6B4105;
        }

        .nav {
            background-color: #BD0112;
        }

        .bg-mfu-dark-red {
            background-color: #8C1515;
        }

        .text-mfu-yellow {
            color: #D4AF37;
        }
    </style>
</head>

<body class="main-bg min-h-screen flex">

    <aside class="w-64 bg-mfu-red text-white flex flex-col h-screen z-20 shadow-xl fixed left-0 top-0">
        <div class="nav p-6 flex flex-col items-center">
            <img src="/dashbordVoter/WebAppProject/public/img/MFU_LOGO.png" alt="" width="70">
            <h1 class="text-2xl font-black text-mfu-yellow mb-1">MFU E-VOTING</h1></div>
            <div class="nav p-6 flex flex-col items-left bg-white shadow-sm h-full">
            <li><a href="/dashbordVoter/WebAppProject/views/VoterDash.html" id="menu-dashboards"
                    class="block px-4 py-3 bg-red-900/60 border-l-4 border-mfu-yellow text-mfu-yellow font-bold rounded">Dashboard</a></li>
            <li><a href="/dashbordVoter/WebAppProject/views/VoterCandi.html" id="menu-candidates"
                    class="block px-4 py-3 hover:bg-red-900 rounded transition-colors">Candidates Policy</a></li>
            <li><a href="/dashbordVoter/WebAppProject/views/VoterVote.html" id="menu-vote"
                    class="block px-4 py-3 hover:bg-red-900 rounded transition-colors">Vote</a></li>
            <li><a href="/dashbordVoter/WebAppProject/views/VoterHis.html" id="menu-history"
                    class="block px-4 py-3 hover:bg-red-900 rounded transition-colors">Vote History</a></li>
            <button class="btn btn-soft btn-error mt-auto">Log Out</button>
        </div>
    </aside>

    <div class="flex-1 ml-64">
        <div class="container mx-auto px-4 pb-10">
            <div class="mb-10">
                <br>
                <p class="text-4xl font-bold mb-4">Candidates</p>
                <div id="candidate" class="flex flex-wrap gap-4">
                </div>
            </div>

                <div>
                    <table>
                        <tr>
                            <td class="font-bold text-warning w-1/3">Voters</td>
                            <td>10,000,000</td>
                        </tr>
                        <tr>
                            <td class="font-bold text-secondary">Candidates</td>
                            <td id="countCandidate">5</td>
                        </tr>
                        <tr>
                            <td class="font-bold text-accent">Total Voting</td>
                            <td>1,223</td>
                        </tr>
                        <tr>
                            <td class="font-bold text-primary">Percentage of Voting</td>
                            <td>0.01233 %</td>
                        </tr>
                    </table>
                </div>
            </div>
            <section>
                <div class="lg:col-span-2 card p-6">
                    <h3 class="text-lg font-semibold mb-4 text-gray-700">Live Results</h3>
                    <div class="chart-container">
                        <canvas id="scoreChart" aria-label="Live Results Chart"></canvas>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        let candidates = [
            { "name": "Nuu" },
            { "name": "Tank" },
            { "name": "Takky" },
            { "name": "Mark" },
            { "name": "ChuckChard" }
        ];

        const candidateEl = document.getElementById("candidate");

        function candidateCardHTML(item) {
            return `
                <div class="card candidate-card shadow-sm">
                    <figure class="px-2 pt-4">
                        <img src="/dashbordVoter/WebAppProject/public/img/${item.name}.png" alt="${item.name}" 
                             class="h-25 w-25 object-contain bg-white rounded-full border">
                    </figure>
                    <div class="card-body p-3 items-center text-center">
                        <h2 class="text-xl font-bold text-black">${item.name}</h2>
                        <br>
                        <button class="btn sm-btn w-full mt-1 text-l" onclick="window.location.href='/dashbordVoter/WebAppProject/views/VoterCandi.html'">See More</button>
                    </div>
                </div>
            `;
        }

        function renderAll() {
            candidateEl.innerHTML = candidates.map(candidateCardHTML).join("");
        }

        renderAll();
    </script>
</body>

</html>
